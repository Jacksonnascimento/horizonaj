name: Deploy Horizon AJ Landing Page

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessário para o GHCR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (Suporte ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx (Cache)
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/jacksonnascimento/horizonaj:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH to Hetzner
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/site-horizon
            docker compose pull
            docker compose up -d